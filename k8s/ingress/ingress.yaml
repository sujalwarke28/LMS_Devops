apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lms-ingress
  namespace: lms
  labels:
    app: lms
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"  # Uncomment with cert-manager
spec:
  # tls:
  #   - hosts:
  #       - lms.yourdomain.com
  #     secretName: lms-tls
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: lms-backend
                port:
                  number: 5000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: lms-backend
                port:
                  number: 5000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: lms-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lms-frontend
                port:
                  number: 80
